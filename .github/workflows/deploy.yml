name: Deploy Empresa

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e # Detener el script si algo falla
            
            mkdir -p ~/app-empresa
            cd ~/app-empresa

            git config --global --add safe.directory /home/${{ secrets.SSH_USER }}/app-empresa

            # 1. Actualización forzada
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # 2. Inyectar .env
            echo "${{ secrets.DOTENV_FILE }}" > .env

            # 3. Limpieza PREVENTIVA (Vital para discos de 30GB)
            echo "Limpiando espacio en disco..."
            docker system prune -f
            
            # 4. Reconstrucción controlada
            # Usamos --parallel 1 para que no intente compilar todo a la vez y sature la RAM
            docker compose down --remove-orphans
            docker compose build --no-cache --pull
            docker compose up -d --force-recreate

            # 5. Migraciones (Prisma)
            echo "Esperando a que la base de datos esté lista..."
            sleep 10
            docker compose exec -T app npx prisma migrate deploy || echo "⚠️ Migraciones fallidas"

            # 6. Limpieza POST-BUILD
            docker image prune -f

      # --- SECCIÓN DE NOTIFICACIONES ---
      
      - name: Notificación de Éxito ✅
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚀 Despliegue EXITOSO: ${{ github.repository }}"
          to: tu-correo@ejemplo.com
          from: GitHub Actions
          body: |
            El despliegue en la MV-Backend-SRC terminó correctamente.
            Commit: ${{ github.sha }}
            Mensaje: ${{ github.event.head_commit.message }}

      - name: Notificación de Fallo ❌
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "⚠️ ERROR en Despliegue: ${{ github.repository }}"
          to: tu-correo@ejemplo.com
          from: GitHub Actions
          body: |
            Algo salió mal en el deploy a Azure. 
            Revisa los logs aquí: https://github.com/${{ github.repository }}/actions