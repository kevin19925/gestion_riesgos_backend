name: Deploy Empresa

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p ~/app-empresa
            cd ~/app-empresa

            git config --global --add safe.directory /home/${{ secrets.SSH_USER }}/app-empresa

            # 1. Sincronizar código
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # 2. Variables de entorno
            echo "${{ secrets.DOTENV_FILE }}" > .env
            if ! grep -q '^DATABASE_URL=' .env; then
              echo "ERROR: El secret DOTENV_FILE no contiene DATABASE_URL=..."
              echo "Claves encontradas en .env (sin valores):"
              sed -E 's/=.*$//' .env | sed '/^[[:space:]]*$/d'
              exit 1
            fi

            # 3. Limpieza de espacio (Vital para 30GB de disco)
            docker system prune -f

            # 4. Levantar contenedores (Cambiamos npm ci por install internamente)
            docker compose --env-file .env down --remove-orphans
            docker compose --env-file .env build --no-cache
            docker compose --env-file .env up -d --force-recreate

            # 5. Migraciones Prisma
            sleep 10
            docker compose --env-file .env exec -T app npx prisma migrate deploy
            
            # 6. Limpieza final
            docker image prune -f