name: Deploy Empresa
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Crear carpeta si no existe y entrar
            mkdir -p ~/app-empresa
            cd ~/app-empresa

            # 2. Configurar Git para que confíe en la carpeta (evita errores de permisos)
            git config --global --add safe.directory /home/${{ secrets.SSH_USER }}/app-empresa

            # 3. Actualizar el código de forma forzada
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # 4. Inyectar el archivo .env desde los Secrets de GitHub
            # Asegúrate de haber creado el secret "DOTENV_FILE" en GitHub
            echo "${{ secrets.DOTENV_FILE }}" > .env

            # 5. Levantar el servicio (Prueba ambos comandos por si la versión de Docker varía)
            docker compose up -d --build || docker-compose up -d --build
            
            # 6. Ejecutar migraciones de Prisma dentro del contenedor
            docker compose exec -T app npx prisma migrate deploy || docker-compose exec -T app npx prisma migrate deploy || echo "Migraciones no ejecutadas - verificar manualmente"
            
            # 7. Limpieza de imágenes huérfanas para no llenar el disco de la VM
            docker image prune -f