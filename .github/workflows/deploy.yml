name: Deploy Empresa
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p ~/app-empresa
            cd ~/app-empresa

            git config --global --add safe.directory /home/${{ secrets.SSH_USER }}/app-empresa

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # .env desde secret (heredoc evita que comillas/; rompan el script)
            cat > .env <<'END_ENV_CONTENT'
            ${{ secrets.DOTENV_FILE }}
            END_ENV_CONTENT
            sed -i '1s/^\xEF\xBB\xBF//' .env 2>/dev/null || true
            tr -d '\r' < .env > .env.tmp && mv .env.tmp .env

            docker compose --env-file .env down --remove-orphans 2>/dev/null || docker-compose --env-file .env down --remove-orphans 2>/dev/null || true
            docker builder prune -f 2>/dev/null || true
            docker compose --env-file .env build --no-cache || docker-compose --env-file .env build --no-cache
            docker compose --env-file .env up -d || docker-compose --env-file .env up -d

            sleep 8
            export DATABASE_URL=$(grep -E '^[[:space:]]*DATABASE_URL=' .env | head -1 | cut -d= -f2- | sed 's/^["'\'']//;s/["'\'']$//' | tr -d '\r')
            docker compose --env-file .env exec -T -e DATABASE_URL app npx prisma migrate deploy 2>/dev/null || docker-compose --env-file .env exec -T -e DATABASE_URL app npx prisma migrate deploy || echo "Migraciones omitidas - revisar DOTENV_FILE si aplica"

            docker image prune -f 2>/dev/null || true