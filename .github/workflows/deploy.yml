# Deploy Backend - Gestión de Riesgos (rama main). Repo privado: secret GH_CLONE_TOKEN.
# Para recibir correo si falla o si desplegó bien: GitHub → tu perfil → Settings → Notifications
# → en "Actions" activa "Email" (te llega al correo de tu cuenta Git).
name: Deploy Empresa

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            mkdir -p ~/app-empresa
            cd ~/app-empresa

            echo "==> Git safe.directory..."
            git config --global --add safe.directory /home/${{ secrets.SSH_USER }}/app-empresa 2>/dev/null || true

            echo "==> Actualizando código (main)..."
            REPO="${{ github.repository }}"
            if [ -n "${{ secrets.GH_CLONE_TOKEN }}" ]; then
              URL="https://x-access-token:${{ secrets.GH_CLONE_TOKEN }}@github.com/${REPO}.git"
            else
              URL="https://github.com/${REPO}.git"
            fi
            if [ ! -d ".git" ]; then
              find . -maxdepth 1 -mindepth 1 -exec rm -rf {} + 2>/dev/null || true
              git clone "$URL" . || ( find . -maxdepth 1 -mindepth 1 -exec rm -rf {} + 2>/dev/null; git clone "$URL" . || exit 1 )
              git checkout main 2>/dev/null || git checkout master || true
            else
              git remote set-url origin "$URL" 2>/dev/null || true
              ( git fetch origin main && git reset --hard origin/main && git checkout main ) || ( git fetch origin master && git reset --hard origin/master && git checkout master )
            fi

            set -e
            echo "==> .env..."
            echo "${{ secrets.DOTENV_FILE }}" > .env

            echo "==> Docker down..."
            docker compose down --remove-orphans 2>/dev/null || docker-compose down --remove-orphans 2>/dev/null || true

            echo "==> Docker build (sin caché)..."
            docker builder prune -f 2>/dev/null || true
            docker compose build --no-cache || docker-compose build --no-cache
            docker compose up -d || docker-compose up -d

            echo "==> Migraciones Prisma..."
            sleep 8
            for i in 1 2 3 4 5; do
              docker compose exec -T app npx prisma migrate deploy 2>/dev/null && break
              [ "$i" -eq 5 ] || sleep 3
            done

            echo "==> Limpieza..."
            docker image prune -f 2>/dev/null || true
            echo "==> Deploy backend listo."
