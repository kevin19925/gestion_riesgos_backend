# =============================================================================
# Deploy Backend - Gestión de Riesgos
# Rama: main. Cada push a main despliega en el servidor vía SSH + Docker.
# Las notificaciones de éxito/fallo las envía GitHub automáticamente al correo
# de tu cuenta (sin configurar nada más).
# =============================================================================

name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            export DEPLOY_DIR="$HOME/app-empresa"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "==> Configurando Git..."
            git config --global --add safe.directory "$DEPLOY_DIR" 2>/dev/null || true

            echo "==> Actualizando código (main)..."
            if [ ! -d ".git" ]; then
              git clone --branch main https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
              git checkout main
            fi

            echo "==> Creando .env..."
            echo "${{ secrets.DOTENV_FILE }}" > .env

            echo "==> Deteniendo contenedores..."
            docker compose down --remove-orphans 2>/dev/null || docker-compose down --remove-orphans 2>/dev/null || true

            echo "==> Build Docker (sin caché)..."
            export BUILDKIT_PROGRESS=plain
            docker compose build --no-cache --progress=plain 2>&1 || docker-compose build --no-cache 2>&1

            echo "==> Levantando contenedores..."
            docker compose up -d || docker-compose up -d

            echo "==> Esperando y ejecutando migraciones Prisma..."
            sleep 8
            for i in 1 2 3 4 5; do
              if docker compose exec -T app npx prisma migrate deploy 2>/dev/null; then
                break
              fi
              [ "$i" -eq 5 ] && true
              sleep 3
            done

            echo "==> Limpieza de imágenes..."
            docker image prune -f 2>/dev/null || true
            echo "==> Deploy backend listo."
