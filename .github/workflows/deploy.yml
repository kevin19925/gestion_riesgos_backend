name: Deploy Empresa

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p ~/app-empresa
            cd ~/app-empresa

            git config --global --add safe.directory /home/${{ secrets.SSH_USER }}/app-empresa

            # 1. Sincronizar código
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin main
              git reset --hard origin/main
            fi

            # 2. Variables de entorno
            # Escribir el secret tal cual (sin que bash interprete comillas o ; )
            cat > .env <<'EOF'
            ${{ secrets.DOTENV_FILE }}
            EOF
            # Normalizar: quitar BOM UTF-8 y CRLF (Windows)
            sed -i '1s/^\xEF\xBB\xBF//' .env 2>/dev/null || true
            tr -d '\r' < .env > .env.__tmp && mv .env.__tmp .env

            if ! grep -qE '^[[:space:]]*DATABASE_URL=[^[:space:]]+' .env; then
              echo "ERROR: El secret DOTENV_FILE no contiene DATABASE_URL=..."
              echo "Claves encontradas en .env (sin valores):"
              awk -F= 'NF {print $1}' .env | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^#' | grep -v '^[[:space:]]*$' || true
              exit 1
            fi

            # 3. Limpieza de espacio (Vital para 30GB de disco)
            docker system prune -f

            # 4. Levantar contenedores (Cambiamos npm ci por install internamente)
            docker compose --env-file .env down --remove-orphans
            docker compose --env-file .env build --no-cache
            docker compose --env-file .env up -d --force-recreate

            # 5. Migraciones Prisma (inyectar DATABASE_URL sin comillas para que Prisma la vea)
            sleep 10
            export DATABASE_URL=$(grep -E '^[[:space:]]*DATABASE_URL=' .env | head -1 | cut -d= -f2- | sed 's/^["'\'']//;s/["'\'']$//' | tr -d '\r')
            docker compose --env-file .env exec -T -e DATABASE_URL app npx prisma migrate deploy
            
            # 6. Limpieza final
            docker image prune -f