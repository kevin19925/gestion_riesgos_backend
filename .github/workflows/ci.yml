# Comprueba build y lint antes de fusionar. Configurá en GitHub:
# Settings → Branches → Branch protection rules → Require status checks → "CI / build"
name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Añadir lint cuando eslint esté alineado con el repo (config local + npm run lint estable).
      - name: Prisma generate and TypeScript build
        run: npm run build
