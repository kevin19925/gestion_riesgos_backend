# Ejemplo para el servidor que expone https://api-erm.comware.com.ec (reverse proxy → Node).
#
# Síntoma en el navegador:
#   "413 Request Entity Too Large" + "blocked by CORS: No Access-Control-Allow-Origin"
# Causa típica: nginx usa client_max_body_size por defecto (~1m). Devuelve 413 antes de
# llegar a Node; esa respuesta no lleva las cabeceras del middleware cors() de Express.
#
# Solución: subir el límite del cuerpo (≥ tamaño máximo de subida en la app, p. ej. 25–50 MB).

client_max_body_size 50m;

